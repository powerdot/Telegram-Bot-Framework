name: Publish to npm

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - name: Install locked dependencies
        run: npm ci
      - name: Verify release version matches GitHub tag
        run: node -e "const version = require('./package.json').version; const tag = process.env.GITHUB_REF_NAME.replace(/^v/, ''); if (version !== tag) { console.error('package.json version ' + version + ' does not match release tag ' + tag); process.exit(1); }"
      - name: Publish public package
        run: npm publish
